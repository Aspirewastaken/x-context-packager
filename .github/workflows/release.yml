name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run full validation
      run: npm run validate && npm run lint && npm test -- --watchAll=false

    - name: Create extension zip
      run: |
        mkdir -p build
        cp manifest.json build/
        cp -r popup content icons build/

        cd build
        zip -r ../x-context-packager-${{ github.ref_name }}.zip .

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: x-context-packager-${{ github.ref_name }}.zip
        generate_release_notes: true
        body: |
          ## X Context Packager ${{ github.ref_name }}

          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.

          ### Installation

          **From this release:**
          1. Download `x-context-packager-${{ github.ref_name }}.zip`
          2. Unzip the file
          3. Open `chrome://extensions`
          4. Enable Developer Mode
          5. Click "Load unpacked" and select the unzipped folder

          **From source:**
          1. Clone this repo
          2. Open `chrome://extensions` → Enable Developer Mode → Load unpacked → select repo root
