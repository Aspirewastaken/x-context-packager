name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run validation
      run: npm run validate

    - name: Run linting
      run: npm run lint

    - name: Run unit tests
      run: npm test -- --coverage --watchAll=false

  manifest-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate manifest.json
      run: |
        python3 -m json.tool manifest.json > /dev/null

        python3 -c "
        import json
        with open('manifest.json') as f:
            data = json.load(f)
        required = ['manifest_version', 'name', 'version', 'description', 'permissions', 'action']
        for field in required:
            assert field in data, f'Missing required field: {field}'
        assert data['manifest_version'] == 3, 'Must be Manifest V3'
        print('Manifest validation passed')
        "

  file-structure-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check required files exist
      run: |
        required_files=(
          "manifest.json"
          "popup/popup.html"
          "popup/popup.css"
          "popup/popup.js"
          "content/content.js"
          "README.md"
          "LICENSE"
          "CONTRIBUTING.md"
          "DESIGN_PHILOSOPHY.md"
          "IMPLEMENTATION_PLAN.md"
        )

        for file in "${required_files[@]}"; do
          if [ ! -f "$file" ]; then
            echo "Missing required file: $file"
            exit 1
          fi
        done

        echo "All required files present"

    - name: Check icon files exist
      run: |
        icon_files=("icons/icon16.png" "icons/icon48.png" "icons/icon128.png")
        missing=0
        for icon in "${icon_files[@]}"; do
          if [ ! -f "$icon" ]; then
            echo "Missing icon file: $icon"
            missing=1
          fi
        done
        if [ $missing -eq 1 ]; then
          echo "Warning: Some icon files are missing"
        else
          echo "All icon files present"
        fi
